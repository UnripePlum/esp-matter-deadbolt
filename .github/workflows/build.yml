name: Build & Release Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache esp-matter SDK
        id: cache-matter
        uses: actions/cache@v4
        with:
          path: /opt/esp-matter
          key: esp-matter-v1.3-idf5.2.1-v2

      - name: Install esp-matter (if not cached)
        if: steps.cache-matter.outputs.cache-hit != 'true'
        run: |
          apt-get update && apt-get install -y git
          git clone --depth 1 --recursive https://github.com/espressif/esp-matter.git /opt/esp-matter
          cd /opt/esp-matter
          ./install.sh
        timeout-minutes: 30

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          export ESP_MATTER_PATH=/opt/esp-matter
          . /opt/esp-matter/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deadbolt-firmware-${{ github.sha }}
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
            build/esp-matter-deadbolt.bin
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
            build/esp-matter-deadbolt.bin
          body: |
            ## Flash Instructions (ESP-IDF 불필요)

            ```bash
            pip install esptool
            esptool.py --chip esp32s3 -p PORT -b 460800 write_flash \
              0x0 bootloader.bin \
              0xc000 partition-table.bin \
              0x1d000 ota_data_initial.bin \
              0x20000 esp-matter-deadbolt.bin
            ```
